{% include 'components/header.html' with title='Projetos DITEC' index=True %}
<body>
    {% include 'components/navbar_login.html' %}


    <div id="container">
        <div class="top-50 start-50  border-2 m-5 p-5 rounded-3 title">
            <h1><strong>Tribunal da Justiça do Acre</strong></h1>
            <h4>GESIS</h4>
        </div>
        <form
            class="position-absolute top-50 start-50 translate-middle border border-secondary border-2 m-2 p-5 rounded-3"
            action="{% url 'login' %}" method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="exampleInputEmail1" class="text-dark ">Insira o seu email:</label>
                <input type="text" class="form-control" aria-describedby="emailHelp" placeholder="Enter email"
                    name="username">
            </div>
            <div class="form-group">
                <label for="exampleInputPassword1" class="text-dark ">Insira a sua senha:</label>
                <input type="password" class="form-control" placeholder="Password" name="password">
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success login" onclick="location.href='/home_page'">Logar</button>
            </div>

        </form>
    </div>

    {% include 'components/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
